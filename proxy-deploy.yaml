apiVersion: v1
kind: Secret
metadata:
  name: jwt-s3-proxy-secret
  namespace: jwt-s3-proxy
type: Opaque
stringData:
  jwt-secret: "jwt-s3-proxy-secret-key-change-in-production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwt-s3-proxy
  namespace: jwt-s3-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwt-s3-proxy
  template:
    metadata:
      labels:
        app: jwt-s3-proxy
    spec:
      containers:
        - name: proxy
          image: jwt-s3-proxy:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-s3-proxy-secret
                  key: jwt-secret
            - name: JWT_EXPIRE_MINUTES
              value: "60"
            - name: S3_ENDPOINT
              value: "http://minio.jwt-s3-proxy.svc.cluster.local:9000"
            - name: S3_ACCESS_KEY
              value: "minioadmin"
            - name: S3_SECRET_KEY
              value: "minioadmin123"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: jwt-s3-proxy
  namespace: jwt-s3-proxy
spec:
  selector:
    app: jwt-s3-proxy
  ports:
    - port: 8000
      targetPort: 8000
